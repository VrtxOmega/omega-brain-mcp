name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pylint fastembed sentence-transformers mcp
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run PyLint
      run: pylint omega_brain_mcp_standalone.py || true

    - name: Run PyTest with Coverage
      env:
        OMEGA_BRAIN_DATA_DIR: /tmp/omega-test-vault
      run: |
        pytest --cov=omega_brain_mcp_standalone tests/
