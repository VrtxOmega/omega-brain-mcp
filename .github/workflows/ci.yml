name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mcp pytest pytest-asyncio pytest-cov

      - name: Verify standalone parses cleanly
        run: python -c "import ast; ast.parse(open('omega_brain_mcp_standalone.py').read()); print('PARSE_OK')"

      - name: Run tests with coverage
        env:
          PYTHONUTF8: "1"
          OMEGA_BRAIN_DATA_DIR: /tmp/omega-brain-ci
        run: |
          pytest tests/ -v --tb=short --cov=omega_brain_mcp_standalone

